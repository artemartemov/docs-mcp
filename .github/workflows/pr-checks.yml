name: PR Validation

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  # ============================================================================
  # PR METADATA VALIDATION
  # ============================================================================
  pr-validation:
    name: PR Validation
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check PR title format
        uses: actions/github-script@v6
        with:
          script: |
            const title = context.payload.pull_request.title;
            const validPrefixes = ['feat:', 'fix:', 'docs:', 'style:', 'refactor:', 'test:', 'chore:', 'ci:', 'perf:', 'revert:'];
            
            const hasValidPrefix = validPrefixes.some(prefix => title.toLowerCase().startsWith(prefix));
            
            if (!hasValidPrefix) {
              core.setFailed(`PR title must start with one of: ${validPrefixes.join(', ')}\nCurrent title: "${title}"`);
            } else {
              console.log(`✅ PR title format is valid: "${title}"`);
            }

      - name: Check PR description
        uses: actions/github-script@v6
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            
            if (body.length < 50) {
              core.setFailed('PR description must be at least 50 characters long');
            }
            
            // Check for required sections
            const requiredSections = ['## Description', '## Type of Change', '## Testing'];
            const missingSections = requiredSections.filter(section => !body.includes(section));
            
            if (missingSections.length > 0) {
              core.setFailed(`PR description is missing required sections: ${missingSections.join(', ')}`);
            } else {
              console.log('✅ PR description contains all required sections');
            }

      - name: Check for breaking changes
        uses: actions/github-script@v6
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const title = context.payload.pull_request.title;
            
            const hasBreakingChange = body.includes('💥 Breaking change') || 
                                     title.includes('BREAKING CHANGE') ||
                                     title.includes('!:');
            
            if (hasBreakingChange) {
              console.log('⚠️ This PR contains breaking changes');
              
              // Add warning label
              github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels: ['breaking-change', 'needs-review']
              });
            }

  # ============================================================================
  # AUTOMATED LABELS
  # ============================================================================
  auto-label:
    name: Auto Label
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Auto-assign labels based on files changed
        uses: actions/github-script@v6
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });
            
            const labels = new Set();
            
            files.forEach(file => {
              const filename = file.filename;
              
              // Documentation changes
              if (filename.endsWith('.md') || filename.includes('docs/')) {
                labels.add('documentation');
              }
              
              // Test changes
              if (filename.includes('test') || filename.startsWith('tests/')) {
                labels.add('tests');
              }
              
              // CI/CD changes
              if (filename.includes('.github/') || filename.includes('Makefile') || filename.endsWith('.yml') || filename.endsWith('.yaml')) {
                labels.add('ci-cd');
              }
              
              // Configuration changes
              if (filename.includes('config') || filename.includes('.env') || filename.endsWith('.toml') || filename.endsWith('.json')) {
                labels.add('configuration');
              }
              
              // Security changes
              if (filename.includes('security') || filename.includes('auth') || filename.includes('.pre-commit')) {
                labels.add('security');
              }
              
              // Dependencies
              if (filename.includes('requirements') || filename.includes('pyproject.toml')) {
                labels.add('dependencies');
              }
              
              // Core functionality
              if (filename.startsWith('src/') && filename.endsWith('.py')) {
                labels.add('core');
              }
            });
            
            if (labels.size > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels: Array.from(labels)
              });
              
              console.log(`✅ Added labels: ${Array.from(labels).join(', ')}`);
            }

  # ============================================================================
  # SIZE ANALYSIS
  # ============================================================================
  pr-size:
    name: PR Size Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Analyze PR size
        uses: actions/github-script@v6
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });
            
            const additions = files.reduce((sum, file) => sum + file.additions, 0);
            const deletions = files.reduce((sum, file) => sum + file.deletions, 0);
            const changes = additions + deletions;
            const fileCount = files.length;
            
            let sizeLabel = '';
            let sizeEmoji = '';
            
            if (changes < 50) {
              sizeLabel = 'size/XS';
              sizeEmoji = '🤏';
            } else if (changes < 150) {
              sizeLabel = 'size/S';
              sizeEmoji = '📦';
            } else if (changes < 500) {
              sizeLabel = 'size/M';
              sizeEmoji = '📋';
            } else if (changes < 1000) {
              sizeLabel = 'size/L';
              sizeEmoji = '📚';
            } else {
              sizeLabel = 'size/XL';
              sizeEmoji = '🚛';
            }
            
            // Add size label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: [sizeLabel]
            });
            
            // Add comment with size analysis
            const comment = `## ${sizeEmoji} PR Size Analysis
            
            - **Files changed**: ${fileCount}
            - **Lines added**: +${additions}
            - **Lines deleted**: -${deletions}
            - **Total changes**: ${changes}
            - **Size**: ${sizeLabel.replace('size/', '').toUpperCase()}
            
            ${changes > 500 ? '⚠️ **Large PR detected!** Consider breaking this into smaller PRs for easier review.' : '✅ Good PR size for review.'}`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: comment
            });

  # ============================================================================
  # QUALITY GATES
  # ============================================================================
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Check for TODO/FIXME comments in PR
        run: |
          echo "Checking for TODO/FIXME comments..."
          if git diff origin/main...HEAD | grep -E "^\+.*#.*(TODO|FIXME|XXX|HACK)" > todo_comments.txt; then
            echo "⚠️ Found TODO/FIXME comments in this PR:"
            cat todo_comments.txt
            echo "Please address these comments before merging or document why they should remain."
          else
            echo "✅ No TODO/FIXME comments found in PR changes."
          fi

      - name: Check for debug code
        run: |
          echo "Checking for debug code..."
          if git diff origin/main...HEAD | grep -E "^\+.*(print\(|console\.log|debugger|pdb\.set_trace)" > debug_code.txt; then
            echo "❌ Found debug code in this PR:"
            cat debug_code.txt
            echo "Please remove debug code before merging."
            exit 1
          else
            echo "✅ No debug code found in PR changes."
          fi

      - name: Verify commit messages
        run: |
          echo "Checking commit message format..."
          git log --oneline origin/main..HEAD | while read line; do
            if [[ ! "$line" =~ ^[a-f0-9]+[[:space:]](feat|fix|docs|style|refactor|test|chore|ci|perf|revert)(\(.+\))?:[[:space:]].+ ]]; then
              echo "❌ Invalid commit message format: $line"
              echo "Use conventional commit format: type(scope): description"
              exit 1
            fi
          done
          echo "✅ All commit messages follow conventional format."