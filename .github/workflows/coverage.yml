name: Test Coverage

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  coverage:
    name: Test Coverage Report
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-coverage-${{ hashFiles('**/requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-coverage-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install pytest-cov coverage[toml]

      - name: Create test ChromaDB directory
        run: |
          mkdir -p /tmp/test_chroma_data
          chmod 755 /tmp/test_chroma_data

      - name: Run tests with coverage
        env:
          MCP_CHROMA_DATA_DIR: /tmp/test_chroma_data
          MCP_ENVIRONMENT: development
          MCP_SECRET_KEY: test-secret-key-32-characters-long-for-testing
          PYTHONPATH: src
        run: |
          pytest --cov=src/docs_mcp --cov-report=xml --cov-report=html --cov-report=term -v

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Generate coverage badge
        run: |
          pip install coverage-badge
          coverage-badge -o coverage.svg

      - name: Upload coverage HTML report
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: |
            htmlcov/
            coverage.xml
            coverage.svg

      - name: Coverage comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            
            // Read coverage data
            let coverageData = '';
            try {
              const result = require('child_process').execSync('coverage report --format=markdown', { encoding: 'utf8' });
              coverageData = result;
            } catch (error) {
              console.log('Could not generate coverage report');
              return;
            }
            
            const comment = `## 📊 Test Coverage Report
            
            ${coverageData}
            
            📈 **Coverage artifacts uploaded**
            - HTML report available in build artifacts
            - Detailed coverage at: [Codecov](https://codecov.io/gh/${{ github.repository }})
            
            ${coverageData.includes('TOTAL') && parseFloat(coverageData.match(/TOTAL.*?(\d+)%/)?.[1] || '0') < 80 ? 
              '⚠️ **Coverage below 80%** - Consider adding more tests' : 
              '✅ Good test coverage!'}`;
            
            // Find existing coverage comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });
            
            const existingComment = comments.find(comment => 
              comment.body.includes('## 📊 Test Coverage Report')
            );
            
            if (existingComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: comment
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: comment
              });
            }

  coverage-diff:
    name: Coverage Diff
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install pytest-cov coverage[toml] diff-cover

      - name: Create test ChromaDB directory
        run: |
          mkdir -p /tmp/test_chroma_data
          chmod 755 /tmp/test_chroma_data

      - name: Run tests for PR branch
        env:
          MCP_CHROMA_DATA_DIR: /tmp/test_chroma_data
          MCP_ENVIRONMENT: development
          MCP_SECRET_KEY: test-secret-key-32-characters-long-for-testing
          PYTHONPATH: src
        run: |
          pytest --cov=src/docs_mcp --cov-report=xml:coverage-pr.xml -v

      - name: Checkout main branch
        run: |
          git fetch origin main
          git checkout origin/main

      - name: Run tests for main branch
        env:
          MCP_CHROMA_DATA_DIR: /tmp/test_chroma_data
          MCP_ENVIRONMENT: development
          MCP_SECRET_KEY: test-secret-key-32-characters-long-for-testing
          PYTHONPATH: src
        run: |
          pytest --cov=src/docs_mcp --cov-report=xml:coverage-main.xml -v || true

      - name: Generate coverage diff
        run: |
          git checkout ${{ github.head_ref }}
          
          # Generate diff coverage report
          diff-cover coverage-pr.xml --compare-branch=origin/main --html-report=diff-coverage.html > diff-coverage.txt || true
          
          echo "## 📈 Coverage Diff Report" > coverage-diff-report.md
          echo "" >> coverage-diff-report.md
          if [ -f diff-coverage.txt ]; then
            echo '```' >> coverage-diff-report.md
            cat diff-coverage.txt >> coverage-diff-report.md
            echo '```' >> coverage-diff-report.md
          else
            echo "Could not generate coverage diff" >> coverage-diff-report.md
          fi

      - name: Upload diff coverage report
        uses: actions/upload-artifact@v3
        with:
          name: coverage-diff
          path: |
            diff-coverage.html
            coverage-diff-report.md
            diff-coverage.txt