name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  PYTHON_DEFAULT_VERSION: "3.11"
  PYTHONPATH: src

jobs:
  # ============================================================================
  # CODE QUALITY CHECKS
  # ============================================================================
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_DEFAULT_VERSION }}

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/pip
            ~/.cache/pre-commit
          key: ${{ runner.os }}-deps-${{ hashFiles('**/requirements-dev.txt', '**/.pre-commit-config.yaml') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pre-commit hooks
        run: |
          pre-commit install
          pre-commit run --all-files

      - name: Check code formatting with Black
        run: |
          black --check --diff src/ scripts/ tests/

      - name: Run linting with flake8
        run: |
          flake8 src/docs_mcp/ scripts/ tests/

      - name: Run type checking with mypy
        run: |
          mypy src/docs_mcp/

      - name: Run security checks with bandit
        run: |
          bandit -r src/docs_mcp/ scripts/ -f json -o bandit-report.json || true
          bandit -r src/docs_mcp/ scripts/

  # ============================================================================
  # CONFIGURATION VALIDATION
  # ============================================================================
  config-validation:
    name: Configuration Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_DEFAULT_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create test ChromaDB directory
        run: |
          mkdir -p /tmp/test_chroma_data
          chmod 755 /tmp/test_chroma_data

      - name: Validate configuration with test environment
        env:
          MCP_CHROMA_DATA_DIR: /tmp/test_chroma_data
          MCP_ENVIRONMENT: development
          MCP_SECRET_KEY: test-secret-key-32-characters-long
        run: |
          PYTHONPATH=src python -c "from docs_mcp.config import validate_environment; validate_environment(); print('✅ Configuration valid')"

      - name: Test module imports
        run: |
          PYTHONPATH=src python -c "import docs_mcp.server; import docs_mcp.config; import docs_mcp.cli; print('✅ All imports working')"

  # ============================================================================
  # UNIT AND INTEGRATION TESTS
  # ============================================================================
  test:
    name: Tests (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Test minimum and latest Python on Ubuntu (our primary platform)
          - os: ubuntu-latest
            python-version: "3.8"
          - os: ubuntu-latest
            python-version: "3.11"
          # Test latest Python on other OS for cross-platform compatibility
          - os: windows-latest
            python-version: "3.11"
          - os: macos-latest
            python-version: "3.11"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/pip
            ~/AppData/Local/pip/Cache  # Windows
            ~/Library/Caches/pip      # macOS
          key: ${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-py${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Create test ChromaDB directory
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            mkdir -p /d/tmp/test_chroma_data
            TEST_CHROMA_DIR="/d/tmp/test_chroma_data"
          else
            mkdir -p /tmp/test_chroma_data
            TEST_CHROMA_DIR="/tmp/test_chroma_data"
          fi
          echo "TEST_CHROMA_DIR=$TEST_CHROMA_DIR" >> $GITHUB_ENV

      - name: Run unit tests
        env:
          MCP_CHROMA_DATA_DIR: ${{ env.TEST_CHROMA_DIR }}
          MCP_ENVIRONMENT: development
          MCP_SECRET_KEY: test-secret-key-32-characters-long-for-testing
          PYTHONPATH: src
        run: |
          python -m pytest tests/unit/ -v --tb=short

      - name: Run integration tests (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        env:
          MCP_CHROMA_DATA_DIR: ${{ env.TEST_CHROMA_DIR }}
          MCP_ENVIRONMENT: development
          MCP_SECRET_KEY: test-secret-key-32-characters-long-for-testing
          PYTHONPATH: src
        run: |
          python -m pytest tests/integration/ -v --tb=short || echo "⚠️ Integration tests may fail without ChromaDB data"

  # ============================================================================
  # SECURITY SCANNING
  # ============================================================================
  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_DEFAULT_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run safety check for vulnerabilities
        run: |
          safety check --json --output safety-report.json || true
          safety check

      - name: Run pip-audit for dependency vulnerabilities
        run: |
          pip-audit --desc --format=json --output=pip-audit-report.json || true
          pip-audit --desc

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json
            pip-audit-report.json

  # ============================================================================
  # BUILD AND PACKAGE VALIDATION
  # ============================================================================
  build:
    name: Build and Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_DEFAULT_VERSION }}

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: |
          python -m build

      - name: Verify package
        run: |
          twine check dist/*

      - name: Test package installation
        run: |
          pip install dist/*.whl
          docs-mcp --help
          python -c "import docs_mcp; print('✅ Package installs and imports correctly')"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ============================================================================
  # CLI FUNCTIONALITY TESTS
  # ============================================================================
  cli-tests:
    name: CLI Functionality
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_DEFAULT_VERSION }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install package
        run: |
          pip install dist/*.whl

      - name: Create test environment
        run: |
          mkdir -p /tmp/test_chroma_data
          cp .env.example .env
          
      - name: Test CLI commands
        env:
          MCP_CHROMA_DATA_DIR: /tmp/test_chroma_data
          MCP_ENVIRONMENT: development
          MCP_SECRET_KEY: test-secret-key-32-characters-long-for-testing
        run: |
          docs-mcp --help
          docs-mcp server --config
          docs-mcp dev --clean
          echo "✅ CLI commands work correctly"

  # ============================================================================
  # SUMMARY JOB
  # ============================================================================
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [quality, config-validation, test, security, build, cli-tests]
    if: always()
    steps:
      - name: Check all jobs status
        run: |
          echo "Quality: ${{ needs.quality.result }}"
          echo "Config Validation: ${{ needs.config-validation.result }}"
          echo "Tests: ${{ needs.test.result }}"
          echo "Security: ${{ needs.security.result }}"
          echo "Build: ${{ needs.build.result }}"
          echo "CLI Tests: ${{ needs.cli-tests.result }}"
          
          if [[ "${{ needs.quality.result }}" == "success" && \
                "${{ needs.config-validation.result }}" == "success" && \
                "${{ needs.test.result }}" == "success" && \
                "${{ needs.security.result }}" == "success" && \
                "${{ needs.build.result }}" == "success" && \
                "${{ needs.cli-tests.result }}" == "success" ]]; then
            echo "🎉 All CI checks passed!"
            exit 0
          else
            echo "❌ Some CI checks failed"
            exit 1
          fi